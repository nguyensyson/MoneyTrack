# =============================================================================
# MoneyTrack — CI/CD Pipeline
#
# Architecture:
#   Backend → Docker image → ECR → ECS Fargate (via ALB + Global Accelerator)
#
# Frontend CI/CD is not set up yet.
#
# Auth: GitHub OIDC → IAM Role (no long-lived AWS keys stored in secrets)
# =============================================================================

name: Deploy MoneyTrack

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "Deploy backend to ECS?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      image_tag:
        description: "Docker image tag (leave blank to use git SHA)"
        required: false
        default: ""

# Cancel in-progress runs on the same branch to avoid race conditions
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_BE }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE_NAME }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
  CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Backend: Test → Build → Push to ECR → Deploy to ECS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend:
    name: Backend — Test, Build & Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_backend == 'true')

    # Permissions required for GitHub OIDC token exchange
    permissions:
      id-token: write   # Request OIDC JWT
      contents: read    # Checkout source
      checks: write     # Let mikepenz/action-junit-report create a check run

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      # ── 3. Run backend tests ─────────────────────────────────────────────────
      # The smoke test (MoneyTrackBeApplicationTests) is excluded via the
      # maven-surefire-plugin config in pom.xml because it boots a full Spring
      # context that needs a real DynamoDB endpoint, which CI doesn't provide.
      # Unit tests and property-based tests (jqwik) run without AWS.
      - name: Run backend tests
        working-directory: MoneyTrack_BE
        env:
          # Provide dummy values so the Spring context can start in test mode
          AWS_REGION: ap-southeast-1
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          DYNAMODB_ENDPOINT: http://localhost:8000
          JWT_SECRET: test-secret-key-for-ci-only-not-production
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -q

      # ── 4. Publish test results ───────────────────────────────────────────────
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "MoneyTrack_BE/target/surefire-reports/TEST-*.xml"
          check_name: "Backend Test Results"
          fail_on_failure: true

      # ── 5. Compute image tag ─────────────────────────────────────────────────
      - name: Compute image tag and URI
        id: meta
        run: |
          # Use manual input tag if provided, otherwise use short git SHA
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
            TAG="${TAG:0:7}"
          fi

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "pending")
          IMAGE_URI="${{ env.ECR_REPOSITORY }}:${TAG}"

          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"
          echo "Image URI: ${IMAGE_URI}"

      # ── 6. Configure AWS credentials via OIDC ────────────────────────────────
      # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed.
      # GitHub exchanges the OIDC token for temporary STS credentials.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-moneytrack-${{ github.run_id }}

      # ── 7. Login to Amazon ECR ───────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 8. Build and push Docker image ───────────────────────────────────────
      - name: Build and push backend Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ./MoneyTrack_BE
          file: ./MoneyTrack_BE/Dockerfile
          push: true
          # Tag with both the short SHA and 'latest' for easy rollback
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REPOSITORY }}:latest
          # Use GitHub Actions cache to speed up layer reuse
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # Disable SBOM provenance to keep manifest simple

      # ── 9. Render new ECS task definition ────────────────────────────────────
      # Downloads the current task definition and replaces only the image URI.
      # All other settings (CPU, memory, secrets, env vars) remain unchanged.
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_FAMILY }}" \
            --query taskDefinition \
            > /tmp/task-definition.json

      - name: Render updated ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      # ── 10. Deploy to ECS ────────────────────────────────────────────────────
      # Registers the new task definition revision and updates the ECS service.
      # Waits for the service to reach a stable state (all tasks healthy).
      # The ECS service has deployment_circuit_breaker enabled — it will
      # automatically roll back if the new tasks fail health checks.
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      # ── 11. Verify deployment ────────────────────────────────────────────────
      - name: Verify ECS service is stable
        run: |
          echo "Checking ECS service status..."
          aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,Pending:pendingCount}' \
            --output table

          echo "Deployed image: ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Notify on failure
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [backend]
    if: failure()

    steps:
      - name: Report deployment failure
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"
          echo "Backend job status : ${{ needs.backend.result }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
