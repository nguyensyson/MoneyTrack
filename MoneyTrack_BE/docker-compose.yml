# =============================================================================
# MoneyTrack Backend — DynamoDB Local only
# Dùng file này khi chạy backend bằng IDE (mvn spring-boot:run / IntelliJ)
# và chỉ cần DynamoDB Local chạy trong Docker.
#
# Để chạy toàn bộ stack (backend + frontend + DynamoDB), dùng:
#   docker compose -f ../docker-compose.yml up --build
# =============================================================================

services:

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
