spring.application.name=MoneyTrack_BE

# Server
server.port=${PORT:8080}

# ============================================================
# AWS / DynamoDB Configuration
# All values are injected via environment variables.
# Do NOT hard-code credentials here.
# ============================================================
aws.region=${AWS_REGION:ap-southeast-1}
aws.dynamodb.endpoint=${DYNAMODB_ENDPOINT:}

# Table names (single-table design with prefix)
dynamodb.table.users=${DYNAMODB_TABLE_USERS:moneytrack-users}
dynamodb.table.roles=${DYNAMODB_TABLE_ROLES:moneytrack-roles}
dynamodb.table.categories=${DYNAMODB_TABLE_CATEGORIES:moneytrack-categories}
dynamodb.table.transactions=${DYNAMODB_TABLE_TRANSACTIONS:moneytrack-transactions}

# JWT
jwt.secret=${JWT_SECRET:changeme-use-a-strong-secret-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.com.money=INFO
logging.level.software.amazon.awssdk=WARN
